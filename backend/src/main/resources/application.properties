spring.application.name=event-platform

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/event_platform?useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:eventuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:eventpassword}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your_email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# JWT
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGeneration2024EventPlatform}
jwt.expiration=86400000

# Admin credentials
admin.email=${ADMIN_EMAIL:admin@eventplatform.com}
admin.password=${ADMIN_PASSWORD:Admin@123}

# Server
server.port=8080

# CORS
cors.allowed.origins=http://localhost:3000,http://frontend:80
