spring.application.name=event-platform

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/event_platform}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Disable mail auto-configuration completely
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# JWT
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGeneration2024EventPlatform}
jwt.expiration=86400000

# Admin
admin.email=${ADMIN_EMAIL:admin@eventplatform.com}
admin.password=${ADMIN_PASSWORD:Admin@123}

# Server
server.port=8080

# CORS
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}