version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: event-platform-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: event_platform
      MYSQL_USER: eventuser
      MYSQL_PASSWORD: eventpassword
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: ./backend
    container_name: event-platform-backend
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/event_platform?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: eventuser
      SPRING_DATASOURCE_PASSWORD: eventpassword
      MAIL_USERNAME: ${MAIL_USERNAME:-your_email@gmail.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-your_app_password}
      JWT_SECRET: mySecretKeyForJWTTokenGeneration2024EventPlatform
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: event-platform-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
